#=================================================================================
# 容器相关设置

#=================================================================================
# spring 组件相关设置
spring:
  application:
    name: starmol-sso-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  #    active: 'gatling'
  jackson:
    default-property-inclusion: non_null
    date-format: 'yyyy-MM-dd HH:mm:ss'
  thymeleaf:
    encoding: utf-8
    prefix: 'classpath:/templates/'
    suffix: '.html'
    cache: false
  server:
    use-forward-headers: true
#    tomcat:
#      protocolHeader: X-Forwarded-Proto
#      protocolHeaderHttpsValue: https


# actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: ALWAYS
  server:
    servlet:
      context-path: /sso-actuator