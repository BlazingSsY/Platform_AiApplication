services:
  postgres:
    image: postgres:14-alpine
    container_name: daip-postgres
    env_file:
      - .env
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # 合并基线：仅当数据卷为空(首次)时由官方镜像自动执行；已有数据则跳过，重启不丢。
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: daip-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: daip-minio
    env_file:
      - .env
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  portal-backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        MODULE: portal-backend
    container_name: daip-portal-backend
    env_file:
      - .env
    environment:
      SERVER_PORT: 8011
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8011/portal/v1/applications || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  circuit-review-backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        MODULE: circuit-review-backend
    container_name: daip-circuit-review-backend
    env_file:
      - .env
    environment:
      SERVER_PORT: 8012
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8012/circuitreview/v1/circuit-review/deployment-type || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      portal-backend:
        condition: service_started
    restart: unless-stopped

  sourcecode-review-backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        MODULE: sourcecode-review-backend
    container_name: daip-sourcecode-review-backend
    env_file:
      - .env
    environment:
      SERVER_PORT: 8013
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8013/sourcecodereview/swagger-ui/index.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      portal-backend:
        condition: service_started
    restart: unless-stopped

  logical-review-backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        MODULE: logical-review-backend
    container_name: daip-logical-review-backend
    env_file:
      - .env
    environment:
      SERVER_PORT: 8014
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8014/logicreview/swagger-ui/index.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      portal-backend:
        condition: service_started
    restart: unless-stopped

  sso-server:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        MODULE: sso-server
    container_name: daip-sso-server
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:19091/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    depends_on:
      redis:
        condition: service_healthy
      portal-backend:
        condition: service_started
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: daip-gateway
    ports:
      - "${GATEWAY_PORT:-18080}:80"
    depends_on:
      portal-backend:
        condition: service_healthy
      circuit-review-backend:
        condition: service_healthy
      sourcecode-review-backend:
        condition: service_healthy
      logical-review-backend:
        condition: service_healthy
      sso-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
