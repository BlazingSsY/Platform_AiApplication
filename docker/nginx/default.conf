# WebSocket 连接升级映射（供 /documentReview/ws 等反代使用）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream portal_backend {
    server portal-backend:8011;
}

upstream circuit_review_backend {
    server circuit-review-backend:8012;
}

upstream sourcecode_review_backend {
    server sourcecode-review-backend:8013;
}

upstream logic_review_backend {
    server logical-review-backend:8014;
}

upstream sso_server {
    server sso-server:9091;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 1024m;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /portal {
        return 308 /portal/;
    }

    location ^~ /portal/ {
        proxy_pass http://portal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /circuitreview {
        return 308 /circuitreview/;
    }

    location ^~ /circuitreview/ {
        proxy_pass http://circuit_review_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sourcecodereview {
        return 308 /sourcecodereview/;
    }

    location ^~ /sourcecodereview/ {
        proxy_pass http://sourcecode_review_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /logicreview {
        return 308 /logicreview/;
    }

    location ^~ /logicreview/ {
        proxy_pass http://logic_review_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sso {
        return 308 /sso/;
    }

    location ^~ /sso/ {
        proxy_pass http://sso_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /documentReview {
        return 308 /documentReview/;
    }

    # 试验大纲审查应用：整段 /documentReview/ 透传到独立容器（ai-review-frontend，宿主机 3030）。
    # 注意 proxy_pass 不带尾部斜杠/路径 —— 保留 /documentReview/ 前缀不剥离。该应用以
    # APP_BASE=/documentReview/ 构建，资源/路由/接口/WS 全在此前缀下，由容器内 nginx 自行分发。
    location ^~ /documentReview/ {
        proxy_pass http://host.docker.internal:3030;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket（应用 /documentReview/ws/）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        client_max_body_size 200M;
    }
}
